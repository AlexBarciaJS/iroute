services:
  mysql:
    image: mysql:8.0
    container_name: iroute-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: iroutedb
      MYSQL_USER: iroute
      MYSQL_PASSWORD: iroute
    ports:
      - "3306:3306"
    volumes:
      - iroute_mysql_data:/var/lib/mysql
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/02_procedures.sql:/docker-entrypoint-initdb.d/02_procedures.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  iroute_mysql_data:
